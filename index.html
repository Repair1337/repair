<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23e30613'/><path d='M28 78L28 22L56 22C70 22 76 31 76 42C76 53 68 58 56 58L28 58M46 58L70 78' fill='none' stroke='white' stroke-width='10' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    <title>Repair</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;900&display=swap');
        /* Логотип Repair.: R и точка — красные (#e30613), font-weight 900, на 40% крупнее */
        .logo-r, .logo-dot { font-family: 'Montserrat', sans-serif; font-weight: 900; color: #e30613; font-size: 1.4em; line-height: 1; vertical-align: baseline; }
        /* epair — тёмный (#1a1a1a), тонкий (font-weight 300) */
        .logo-epair { font-family: 'Montserrat', sans-serif; font-weight: 300; color: #1a1a1a; }

        body {
            margin: 0;
            background-color: #f5f5f5;
            color: #1a1a1a;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #ffffff;
            padding: 16px 24px;
            border-bottom: 1px solid #e0e0e0;
        }

        header span {
            font-size: 1.4rem;
            font-weight: bold;
            color: #e30613;
        }

        .page {
            max-width: 800px;
            margin: 0 auto;
            padding: 32px 24px;
            flex: 1;
        }

        h1 {
            font-size: 2rem;
            color: #1a1a1a;
            margin-bottom: 24px;
        }

        .card {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            padding: 20px 24px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            transition: all 0.2s ease;
        }

        .card:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
            transform: translateY(-2px);
        }

        .card-info {
            flex: 1;
        }

        .card-name {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .card-address {
            font-size: 0.9rem;
            color: #666666;
            margin-bottom: 8px;
        }

        .card-rating {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 12px;
        }

        .stars {
            color: #f5a623;
            font-size: 1rem;
            letter-spacing: 2px;
        }

        .rating-number {
            font-weight: bold;
            font-size: 0.95rem;
        }

        .reviews {
            font-size: 0.85rem;
            color: #999999;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            background-color: #f0f0f0;
            color: #444444;
            font-size: 0.78rem;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .card-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-left: 16px;
            flex-shrink: 0;
        }

        .btn {
            display: inline-block;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            text-align: center;
            text-decoration: none;
            transition: background-color 0.2s ease;
        }

        .btn-red {
            background-color: #e30613;
            color: #ffffff;
        }

        .btn-red:hover {
            background-color: #c20510;
        }

        .btn-gray {
            background-color: #f0f0f0;
            color: #444444;
        }

        .btn-gray:hover {
            background-color: #dcdcdc;
        }

        footer {
            background-color: #fafafa;
            border-top: 1px solid #e0e0e0;
            padding: 32px 24px;
        }

        .footer-inner {
            max-width: 800px;
            margin: 0 auto 24px auto;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 16px;
        }

        .footer-logo {
            font-size: 1.1rem;
            font-weight: bold;
            color: #e30613;
        }

        .footer-slogan {
            font-size: 0.85rem;
            color: #888888;
            margin-top: 4px;
        }

        .footer-links {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .footer-links a {
            text-decoration: none;
            color: #666666;
            font-size: 0.9rem;
        }

        .footer-links a:hover {
            color: #e30613;
        }

        .footer-copy {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
            font-size: 0.8rem;
            color: #aaaaaa;
        }

        /* Блок с кнопками фильтрации над списком сервисов */
        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        /* Кнопки фильтра — скромные, серые, визуально отличаются от .btn на карточках */
        .filter-btn {
            background-color: #e8e8e8;
            color: #444444;
            border: 1px solid #d0d0d0;
            border-radius: 6px;
            padding: 6px 14px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .filter-btn:hover {
            background-color: #d8d8d8;
        }
    </style>
</head>
<body>

    <header>
        <span><span class="logo-r">R</span><span class="logo-epair">epair</span><span class="logo-dot">.</span></span>
    </header>

    <div class="page">
        <h1>Автосервисы Риги</h1>

        <!-- Кнопки фильтрации. JavaScript найдёт их по id и повесит обработчики -->
        <div class="filters">
            <button class="filter-btn" id="filter-high">Только с рейтингом выше 4.5</button>
            <button class="filter-btn" id="filter-all">Показать все</button>
        </div>

        <!-- Пустой контейнер. JavaScript найдёт его по id и вставит сюда карточки -->
        <div id="services-list"></div>

    </div>

    <footer>
        <div class="footer-inner">
            <div class="footer-brand">
                <div class="footer-logo"><span class="logo-r">R</span><span class="logo-epair">epair</span><span class="logo-dot">.</span></div>
                <div class="footer-slogan">Найди надёжный автосервис в Латвии</div>
            </div>
            <nav class="footer-links">
                <a href="#">О проекте</a>
                <a href="#">Контакты</a>
                <a href="#">Условия использования</a>
            </nav>
        </div>
        <div class="footer-copy">© 2026 Repair. Все права защищены.</div>
    </footer>


    <script src="main.js"></script>

</body>
</html>
