<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23e30613'/><text x='50' y='72' font-family='sans-serif' font-size='65' font-weight='bold' fill='white' text-anchor='middle'>R</text></svg>">
    <title>RepairTech</title>
    <style>
        body {
            margin: 0;
            background-color: #f5f5f5;
            color: #1a1a1a;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #ffffff;
            padding: 16px 24px;
            border-bottom: 1px solid #e0e0e0;
        }

        header span {
            font-size: 1.4rem;
            font-weight: bold;
            color: #e30613;
        }

        .page {
            max-width: 800px;
            margin: 0 auto;
            padding: 32px 24px;
            flex: 1;
        }

        h1 {
            font-size: 2rem;
            color: #1a1a1a;
            margin-bottom: 24px;
        }

        .card {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            padding: 20px 24px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            transition: all 0.2s ease;
        }

        .card:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
            transform: translateY(-2px);
        }

        .card-info {
            flex: 1;
        }

        .card-name {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .card-address {
            font-size: 0.9rem;
            color: #666666;
            margin-bottom: 8px;
        }

        .card-rating {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 12px;
        }

        .stars {
            color: #f5a623;
            font-size: 1rem;
            letter-spacing: 2px;
        }

        .rating-number {
            font-weight: bold;
            font-size: 0.95rem;
        }

        .reviews {
            font-size: 0.85rem;
            color: #999999;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            background-color: #f0f0f0;
            color: #444444;
            font-size: 0.78rem;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .card-buttons {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-left: 16px;
            flex-shrink: 0;
        }

        .btn {
            display: inline-block;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            text-align: center;
            text-decoration: none;
            transition: background-color 0.2s ease;
        }

        .btn-red {
            background-color: #e30613;
            color: #ffffff;
        }

        .btn-red:hover {
            background-color: #c20510;
        }

        .btn-gray {
            background-color: #f0f0f0;
            color: #444444;
        }

        .btn-gray:hover {
            background-color: #dcdcdc;
        }

        footer {
            background-color: #fafafa;
            border-top: 1px solid #e0e0e0;
            padding: 32px 24px;
        }

        .footer-inner {
            max-width: 800px;
            margin: 0 auto 24px auto;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 16px;
        }

        .footer-logo {
            font-size: 1.1rem;
            font-weight: bold;
            color: #e30613;
        }

        .footer-slogan {
            font-size: 0.85rem;
            color: #888888;
            margin-top: 4px;
        }

        .footer-links {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .footer-links a {
            text-decoration: none;
            color: #666666;
            font-size: 0.9rem;
        }

        .footer-links a:hover {
            color: #e30613;
        }

        .footer-copy {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
            font-size: 0.8rem;
            color: #aaaaaa;
        }
    </style>
</head>
<body>

    <header>
        <span>RepairTech</span>
    </header>

    <div class="page">
        <h1>Автосервисы Риги</h1>

        <!-- Пустой контейнер. JavaScript найдёт его по id и вставит сюда карточки -->
        <div id="services-list"></div>

    </div>

    <footer>
        <div class="footer-inner">
            <div class="footer-brand">
                <div class="footer-logo">RepairTech</div>
                <div class="footer-slogan">Найди надёжный автосервис в Латвии</div>
            </div>
            <nav class="footer-links">
                <a href="#">О проекте</a>
                <a href="#">Контакты</a>
                <a href="#">Условия использования</a>
            </nav>
        </div>
        <div class="footer-copy">© 2026 RepairTech. Все права защищены.</div>
    </footer>


    <script>
        // ============================================================
        // МАССИВ ДАННЫХ
        // Каждый объект — это один сервис со всеми нужными полями.
        // Чтобы добавить новый сервис, достаточно добавить объект сюда —
        // карточка появится на странице автоматически.
        // ============================================================
        const services = [
            {
                name:         'AutoPro Riga',
                address:      'ул. Бривибас 145',
                rating:       4.7,
                reviewsText:  '142 отзыва',      // склонение указано вручную
                tags:         ['Кузовной ремонт', 'Покраска', 'Toyota', 'Honda', 'Mazda'],
                starsDisplay: '★★★★★',           // строка со звёздочками как на странице
                detailsUrl:   'autopro.html'
            },
            {
                name:         'Mehanika 24',
                address:      'ул. Маскавас 312',
                rating:       4.5,
                reviewsText:  '98 отзывов',
                tags:         ['Двигатель', 'Дизель', 'Бензин', 'Volkswagen', 'Audi', 'Skoda'],
                starsDisplay: '★★★★½',
                detailsUrl:   'mehanika.html'
            },
            {
                name:         'GarageMaster',
                address:      'ул. Краста 87',
                rating:       4.9,
                reviewsText:  '217 отзывов',
                tags:         ['Тормоза', 'Подвеска', 'BMW', 'Mercedes', 'Opel'],
                starsDisplay: '★★★★★',
                detailsUrl:   'garagemaster.html'
            },
            {
                name:         'TopAuto Service',
                address:      'ул. Земитана 22',
                rating:       4.3,
                reviewsText:  '61 отзыв',
                tags:         ['Электрика', 'Диагностика', 'ТО', 'Ford', 'Renault', 'Hyundai'],
                starsDisplay: '★★★★☆',
                detailsUrl:   'topauto.html'
            }
        ];

        // ============================================================
        // ПОЛУЧАЕМ КОНТЕЙНЕР
        // document.getElementById ищет элемент с нужным id в HTML.
        // Мы сохраняем его в переменную, чтобы потом добавлять карточки.
        // ============================================================
        const container = document.getElementById('services-list');

        // ============================================================
        // ГЕНЕРИРУЕМ КАРТОЧКИ
        // forEach проходит по каждому объекту массива services.
        // Переменная service — это текущий объект на каждом шаге цикла.
        // ============================================================
        services.forEach(function(service) {

            // --- Шаг 1: создаём теги для всех тегов специализации ---
            // map превращает массив строк ['Toyota', 'Honda'] в массив
            // готовых HTML-строк ['<span class="tag">Toyota</span>', ...]
            // join('') склеивает их в одну строку без разделителей.
            const tagsHTML = service.tags
                .map(function(tag) {
                    return '<span class="tag">' + tag + '</span>';
                })
                .join('');

            // --- Шаг 2: создаём div для карточки ---
            // createElement создаёт новый элемент, но пока не добавляет его на страницу.
            const card = document.createElement('div');

            // --- Шаг 3: присваиваем класс ---
            // Это тот же класс, что был в HTML: <div class="card">
            // Благодаря ему карточка получит все нужные стили из CSS.
            card.className = 'card';

            // --- Шаг 4: записываем внутреннее содержимое карточки ---
            // innerHTML — это весь HTML внутри div.card.
            // Структура точно такая же, как была в оригинальном HTML:
            //   .card
            //   ├── .card-info
            //   │   ├── .card-name
            //   │   ├── .card-address
            //   │   ├── .card-rating
            //   │   │   ├── .stars
            //   │   │   ├── .rating-number
            //   │   │   └── .reviews
            //   │   └── .tags  (внутри — span.tag для каждого тега)
            //   └── .card-buttons
            //       ├── a.btn.btn-gray  → ссылка "Подробнее"
            //       └── a.btn.btn-red   → ссылка "Записаться"
            card.innerHTML =
                '<div class="card-info">' +
                    '<div class="card-name">'    + service.name    + '</div>' +
                    '<div class="card-address">' + service.address + '</div>' +
                    '<div class="card-rating">' +
                        '<span class="stars">'         + service.starsDisplay + '</span>' +
                        '<span class="rating-number">' + service.rating       + '</span>' +
                        '<span class="reviews">'       + service.reviewsText  + '</span>' +
                    '</div>' +
                    '<div class="tags">' + tagsHTML + '</div>' +
                '</div>' +
                '<div class="card-buttons">' +
                    '<a class="btn btn-gray" href="' + service.detailsUrl + '">Подробнее</a>' +
                    '<a class="btn btn-red"  href="zapis.html">Записаться</a>' +
                '</div>';

            // --- Шаг 5: вставляем карточку в контейнер ---
            // appendChild добавляет готовый div в конец контейнера #services-list.
            container.appendChild(card);
        });
    </script>

</body>
</html>
